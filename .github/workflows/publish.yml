name: Build & Publish

on:
  push:
    branches: [main]
    paths:
      - 'ch4-cicd/**'
      - '.github/workflows/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ch4-cicd
          push: true
          tags: ghcr.io/${{ github.repository }}/wiki-stats:latest
